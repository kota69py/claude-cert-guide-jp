name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site from base64
        run: |
          set -euo pipefail
          if ls site.full.b64.p* 1>/dev/null 2>&1; then
            echo "Assembling from site.full.b64.p*..."
            cat site.full.b64.p* | tr -d '\n\r' | base64 -d > site.tar.bz2
            tar -xjf site.tar.bz2
            rm -f site.tar.bz2
            ls -la
          elif [ -f site.full.b64 ]; then
            tr -d '\n\r' < site.full.b64 | base64 -d > site.tar.bz2
            tar -xjf site.tar.bz2
            rm -f site.tar.bz2
          elif ls site.b64.* 1>/dev/null 2>&1; then
            cat site.b64.* | tr -d '\n\r' | base64 -d > site.tar.bz2
            tar -xjf site.tar.bz2
            rm -f site.tar.bz2
          fi
          touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
