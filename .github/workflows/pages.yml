name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site from base64 parts (if present)
        run: |
          set -euo pipefail
          if ls site.b64.* 1>/dev/null 2>&1; then
            echo "Assembling site.tar.bz2 from site.b64.* parts..."
            cat site.b64.* | base64 -d > site.tar.bz2
            tar -xjf site.tar.bz2
            rm -f site.tar.bz2
            ls -la
          else
            echo "No site.b64 parts; using repo files as-is"
          fi
          # Ensure Pages does not run Jekyll
          touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
